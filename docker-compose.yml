version: "3.8"

services:
  mysql:
    image: postgres:latest
    container_name: nearme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: nearme_social
      POSTGRES_PASSWORD: nearme_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nearme_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nearme_backend
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - nearme_network
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:

networks:
  nearme_network: